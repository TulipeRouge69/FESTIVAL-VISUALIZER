<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Visualizer Pro EVO - Grid Fix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020204;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* --- UI CONTAINER --- */
  #ui {
    position: fixed;
    z-index: 10;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 1100px; /* Élargi légèrement pour contenir la grille proprement */
    padding: 0 20px;
    transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  #ui.hidden {
    opacity: 0;
    transform: translate(-50%, 30px);
    pointer-events: none;
  }

  /* --- PANNEAU D'ACCUEIL --- */
  #start-panel {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: #020205;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 40px;
    text-align: center;
  }

  #start-panel.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .logo {
    font-size: clamp(40px, 7vw, 64px);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradient-shift 5s ease infinite;
    background-size: 200% auto;
  }

  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: -15px;
  }

  .epilepsy-warning {
    max-width: 520px;
    background: rgba(255, 77, 77, 0.06);
    border: 1px solid rgba(255, 77, 77, 0.2);
    color: #ff4d4d;
    padding: 14px 20px;
    font-size: 11px;
    border-radius: 8px;
    letter-spacing: 0.02em;
    line-height: 1.6;
  }

  /* --- BARRE DE NIVEAU AUDIO --- */
  #level-bar {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(10, 10, 15, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 10px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #level-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  #level-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00f2fe, #4facfe, #00000000);
    background-color: #ff006e;
    box-shadow: 0 0 10px #ff006e;
    transition: width 0.05s ease;
  }

  #bpm-display {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    color: #06ffa5;
    text-shadow: 0 0 8px rgba(6,255,165,0.4);
    min-width: 65px;
    text-align: right;
  }

  /* --- ⚡ RESTRUCTURATION DU DOCK (STRUCTURE FIXE) --- */
  #controls {
    width: 100%;
    display: grid;
    /* 3 colonnes : config (330px max), modes (centre auto), immersif (130px) */
    grid-template-columns: 340px 1fr 130px;
    align-items: center;
    background: rgba(10, 10, 15, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  /* Zones de la Grille */
  .grid-left {
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .grid-center {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .grid-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  /* --- CONFIGURATIONS ANCRÉES SANS POUSSER LE RESTE --- */
  #laser-config, #bars-config {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.04);
    padding: 6px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    animation: fadeIn 0.15s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  #laser-slider {
    width: 75px;
    accent-color: #ff006e;
    height: 4px;
    cursor: pointer;
  }

  /* --- BOUTONS --- */
  .ctrl-btn, .btn-primary, .src-btn, .pos-btn {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.7);
    padding: 10px 18px;
    border-radius: 8px;
    white-space: nowrap;
  }

  .ctrl-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-color: rgba(255,255,255,0.15);
  }

  .ctrl-btn.active {
    background: #ff006e;
    color: #fff;
    border-color: #ff006e;
    box-shadow: 0 0 15px rgba(255, 0, 110, 0.35);
    filter: drop-shadow(0 0 4px rgba(255, 0, 110, 0.4));
  }
  
  .special-btn {
    background: rgba(131, 56, 236, 0.15);
    border-color: rgba(131, 56, 236, 0.3);
    color: #b785ff;
    width: 100%;
    padding: 10px 0;
    text-align: center;
    border-radius: 8px;
  }
  .special-btn:hover { background: rgba(131, 56, 236, 0.25); color: #fff; }
  .special-btn.active {
    background: #8338ec;
    color: #fff;
    border-color: #8338ec;
    box-shadow: 0 0 15px rgba(131, 56, 236, 0.5);
  }

  .btn-primary {
    padding: 16px 36px;
    background: #fff;
    color: #000;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 10px 25px rgba(255,255,255,0.1);
  }
  .btn-primary:hover {
    transform: scale(1.03);
    box-shadow: 0 12px 30px rgba(255, 255, 255, 0.2);
  }

  .pos-btn {
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255,255,255,0.6);
    padding: 5px 10px;
    font-size: 10px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .pos-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .pos-btn.active {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }

  /* --- TOP DROITE : SOURCES --- */
  #source-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    display: none;
    gap: 6px;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 5px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .src-btn {
    padding: 8px 14px;
    background: transparent;
    color: rgba(255,255,255,0.5);
    border-radius: 7px;
    border: 1px solid transparent;
  }
  .src-btn:hover { color: rgba(255,255,255,0.9); }
  .src-btn.active {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.08);
    color: #fff;
  }

  #file-input { display: none; }

  /* --- NOTIFICATIONS --- */
  #msg {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    color: #fff;
    padding: 12px 20px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 30;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  }
  #msg.show { opacity: 1; transform: translateY(0); }

  /* Ajustement Responsive rapide si l'écran est trop petit pour la grille */
  @media (max-width: 850px) {
    #controls {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .grid-left, .grid-center, .grid-right {
      justify-content: center;
      width: 100%;
    }
    .special-btn { width: auto; padding: 10px 18px; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="start-panel">
  <div class="logo">FESTIVAL VISUALIZER</div>
  <div class="subtitle">Live Light & Laser Show</div>
  
  <div class="epilepsy-warning">
    ⚠️ <b>ATTENTION :</b> Ce programme contient des stroboscopes intenses et des variations de lumières rapides pouvant impacter les personnes atteintes d'épilepsie photosensible.
  </div>

  <button class="btn-primary" id="start-btn">Lancer l'Expérience</button>
</div>

<div id="source-toggle">
  <button class="src-btn active" id="btn-screen">🖥 Système</button>
  <button class="src-btn" id="btn-mic">🎤 Micro</button>
  <button class="src-btn" id="btn-file">📁 Fichier</button>
  <input type="file" id="file-input" accept="audio/*,video/*">
</div>

<div id="msg"></div>

<div id="ui" style="display:none">
  <div id="level-bar">
    <div style="font-size:10px; font-weight:700; color:rgba(255,255,255,0.3); letter-spacing:0.1em;">INPUT</div>
    <div id="level-track"><div id="level-fill"></div></div>
    <div id="bpm-display">-- BPM</div>
  </div>
  
  <div id="controls">
    <div class="grid-left">
      <div id="bars-config" style="display: flex;">
        <button class="pos-btn" id="bars-top-toggle">Haut : Non</button>
      </div>

      <div id="laser-config">
        <span>NB: <span id="laser-val">8</span></span>
        <input type="range" id="laser-slider" min="2" max="24" value="8" step="2">
        <button class="pos-btn active" id="pos-top">Haut</button>
        <button class="pos-btn" id="pos-bottom">Bas</button>
        <button class="pos-btn" id="laser-color-toggle">Couleur : Multi</button>
      </div>
    </div>

    <div class="grid-center">
      <button class="ctrl-btn active" id="mode-bars">Barres</button>
      <button class="ctrl-btn" id="mode-circle">Cercle</button>
      <button class="ctrl-btn" id="mode-wave">Vague</button>
      <button class="ctrl-btn" id="mode-laser">Lasers</button>
      <button class="ctrl-btn" id="mode-stage">Scène 🎪</button>
    </div>

    <div class="grid-right">
      <button class="ctrl-btn special-btn" id="btn-immersive">Immersif 👁</button>
    </div>
  </div>
</div>

<script>
// ==========================================
//          🛠 CODE DÉVELOPPEUR (STAGE)
// ==========================================
const DEV_CONFIG = {
  stageLaserCount: 12,       
  interpolationSpeed: 0.40,  
  maxLaserWidth: 6.5,        
  glowIntensity: 28          
};
// ==========================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const startPanel = document.getElementById('start-panel');
const ui = document.getElementById('ui');
const sourceToggle = document.getElementById('source-toggle');
const levelFill = document.getElementById('level-fill');
const bpmDisplay = document.getElementById('bpm-display');
const msgEl = document.getElementById('msg');
const laserConfig = document.getElementById('laser-config');
const barsConfig = document.getElementById('bars-config');
const laserSlider = document.getElementById('laser-slider');
const laserVal = document.getElementById('laser-val');
const btnImmersive = document.getElementById('btn-immersive');
const posTopBtn = document.getElementById('pos-top');
const posBottomBtn = document.getElementById('pos-bottom');
const barsTopToggle = document.getElementById('bars-top-toggle');
const laserColorToggle = document.getElementById('laser-color-toggle');

let audioCtx, analyser, source, animId;
let mode = 'bars';
let doubleBars = false; 
let dataArray, bufferLength;
let hue = 0, time = 0;
let beatHistory = [], lastBeat = 0, bpm = 128;
let laserCount = 8;
let laserPlacement = 'top'; 
let laserColorMode = 'multi'; 
let immersiveMode = false;
let uiTimeout;

let laserAngles = Array(24).fill(0);
let laserTargets = Array(24).fill(0);
let isBeatFrame = false;
let energyHistory = Array(40).fill(0);
let blackoutTimer = 0; 

let crowdOffsets = [];
const crowdSize = 60;
for(let i=0; i<=crowdSize; i++) {
  crowdOffsets.push({
    heightFactor: 0.6 + Math.random() * 0.8,
    speedPhase: Math.random() * Math.PI * 2,
    headRadius: 8 + Math.random() * 4,
    armStyle: Math.floor(Math.random() * 4), 
    armPhase: Math.random() * Math.PI
  });
}

// ===== Nouvelles structures de données pour le mode SCÈNE réaliste =====

// Lyres / projecteurs motorisés (têtes mobiles) — chacune a une position fixe sur la structure
// et une orientation qui s'anime indépendamment.
let moverHeads = []; // rempli dans setupStageRig()
let stageRigReady = false;

// Mur LED façon vraie grille de pixels (colonnes x lignes), chaque cellule a sa propre énergie lissée
const LED_COLS = 18;
const LED_ROWS = 10;
let ledCells = new Float32Array(LED_COLS * LED_ROWS);

// Particules de fumée basses, indépendantes des particules de beat existantes
let smokeParticles = [];
function spawnSmoke(W, H) {
  if (smokeParticles.length > 70) return;
  smokeParticles.push({
    x: W * (0.15 + Math.random() * 0.7),
    y: H * 0.92 + Math.random() * 10,
    vx: (Math.random() - 0.5) * 0.25,
    vy: -0.18 - Math.random() * 0.22,
    r: 30 + Math.random() * 50,
    life: 1
  });
}

function setupStageRig(W, H) {
  moverHeads = [];
  // Rampe avant (face), au-dessus de l'écran LED
  for (let i = 0; i < 6; i++) {
    moverHeads.push({
      group: 'front',
      baseAngle: Math.PI / 2 + 0.15, // pointent globalement vers le bas/public
      swing: 0.9,
      speed: 0.5 + Math.random() * 0.3,
      phase: Math.random() * Math.PI * 2
    });
  }
  // Pendrillons latéraux (gauche/droite), plus hauts, balayage large façon "sweep" de festival
  for (let i = 0; i < 6; i++) {
    const isRight = i >= 3;
    moverHeads.push({
      group: isRight ? 'right' : 'left',
      baseAngle: isRight ? Math.PI * 0.85 : Math.PI * 0.15,
      swing: 1.1,
      speed: 0.35 + Math.random() * 0.25,
      phase: Math.random() * Math.PI * 2
    });
  }
  stageRigReady = true;
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stageRigReady = false; // re-calculé au prochain frame en mode stage si besoin (positions relatives à W/H, pas besoin de recalcul réel, mais on garde le flag pour cohérence)
}
resize();
window.addEventListener('resize', resize);

function showMsg(text) {
  msgEl.textContent = text;
  msgEl.classList.add('show');
  setTimeout(() => msgEl.classList.remove('show'), 3000);
}

function wakeUi() {
  if (!audioCtx) return;
  ui.classList.remove('hidden');
  sourceToggle.classList.remove('hidden');
  clearTimeout(uiTimeout);
  
  if (immersiveMode) {
    uiTimeout = setTimeout(() => {
      if (immersiveMode) {
        ui.classList.add('hidden');
        sourceToggle.classList.add('hidden');
      }
    }, 2000);
  }
}

window.addEventListener('mousemove', wakeUi);
window.addEventListener('touchstart', wakeUi);

btnImmersive.addEventListener('click', (e) => {
  e.stopPropagation();
  immersiveMode = !immersiveMode;
  if (immersiveMode) {
    btnImmersive.classList.add('active');
    showMsg('Mode Immersif activé.');
    wakeUi();
  } else {
    btnImmersive.classList.remove('active');
    clearTimeout(uiTimeout);
    ui.classList.remove('hidden');
    sourceToggle.classList.remove('hidden');
  }
});

laserSlider.addEventListener('input', (e) => {
  laserCount = parseInt(e.target.value);
  laserVal.textContent = laserCount;
});

posTopBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  laserPlacement = 'top';
  posTopBtn.classList.add('active');
  posBottomBtn.classList.remove('active');
});

posBottomBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  laserPlacement = 'bottom';
  posBottomBtn.classList.add('active');
  posTopBtn.classList.remove('active');
});

laserColorToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  if (laserColorMode === 'multi') {
    laserColorMode = 'chroma';
    laserColorToggle.textContent = "Couleur : Chroma";
    laserColorToggle.classList.add('active');
  } else {
    laserColorMode = 'multi';
    laserColorToggle.textContent = "Couleur : Multi";
    laserColorToggle.classList.remove('active');
  }
});

barsTopToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  doubleBars = !doubleBars;
  if (doubleBars) {
    barsTopToggle.textContent = "Haut : Oui";
    barsTopToggle.classList.add('active');
  } else {
    barsTopToggle.textContent = "Haut : Non";
    barsTopToggle.classList.remove('active');
  }
});

async function initAudio(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.25; 
  bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);

  source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);
  
  startPanel.style.display = 'none';
  ui.style.display = 'flex';
  sourceToggle.style.display = 'flex';
  
  if (animId) cancelAnimationFrame(animId);
  animate();
}

async function captureSystem() {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: true, audio: { echoCancellation: false, noiseSuppression: false }
    });
    const audioStream = new MediaStream(stream.getAudioTracks());
    stream.getVideoTracks().forEach(t => t.stop());
    await initAudio(audioStream);
    showMsg('✓ Capture active');
  } catch(e) {
    if(e.name !== 'NotAllowedError') showMsg('Erreur : ' + e.message);
  }
}

startBtn.addEventListener('click', captureSystem);
document.getElementById('btn-screen').addEventListener('click', captureSystem);

document.getElementById('btn-mic').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    await initAudio(stream);
    document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-mic').classList.add('active');
    showMsg('✓ Micro actif');
  } catch(e) { showMsg('Accès micro refusé'); }
});

document.getElementById('btn-file').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if(audioCtx) audioCtx.close();
  
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.25;
  bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);

  const arrayBuffer = await file.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  const bufSource = audioCtx.createBufferSource();
  bufSource.buffer = audioBuffer;
  bufSource.connect(analyser);
  analyser.connect(audioCtx.destination);
  bufSource.start();
  bufSource.loop = true;

  startPanel.style.display = 'none';
  ui.style.display = 'flex';
  sourceToggle.style.display = 'flex';
  document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-file').classList.add('active');
  if (animId) cancelAnimationFrame(animId);
  animate();
});

const modeButtons = { 'mode-bars': 'bars', 'mode-circle': 'circle', 'mode-wave': 'wave', 'mode-laser': 'laser', 'mode-stage': 'stage' };
Object.entries(modeButtons).forEach(([id, m]) => {
  document.getElementById(id).addEventListener('click', (e) => {
    e.stopPropagation();
    mode = m;
    document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    laserConfig.style.display = (m === 'laser' || m === 'stage') ? 'flex' : 'none';
    barsConfig.style.display = (m === 'bars') ? 'flex' : 'none';
  });
});

function checkBeatAndBuildUp(bass, mid, treble) {
  const now = performance.now();
  isBeatFrame = false;

  if (bass > 182 && now - lastBeat > 200) {
    isBeatFrame = true;
    beatHistory.push(now);
    if (beatHistory.length > 8) beatHistory.shift();
    if (beatHistory.length >= 4) {
      const intervals = [];
      for (let i = 1; i < beatHistory.length; i++) intervals.push(beatHistory[i] - beatHistory[i-1]);
      bpm = Math.round(60000 / (intervals.reduce((a,b)=>a+b,0)/intervals.length));
    }
    lastBeat = now;
  }

  energyHistory.push(bass);
  if (energyHistory.length > 35) energyHistory.shift();
  
  const avgBassRecent = energyHistory.slice(-10).reduce((a,b)=>a+b,0) / 10;
  const avgBassOlder = energyHistory.slice(0, 20).reduce((a,b)=>a+b,0) / 20;

  if (avgBassOlder > 120 && avgBassRecent < 32 && (mid > 75 || treble > 55) && blackoutTimer <= 0) {
    blackoutTimer = 50; 
  }
}

let beatFlash = 0, particles = [];

function spawnParticles(x, y, color, count = 10, speedMultiplier = 1) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random()*0.4;
    const speed = (4 + Math.random() * 8) * speedMultiplier;
    particles.push({ 
      x, y, 
      vx: Math.cos(angle)*speed, 
      vy: Math.sin(angle)*speed, 
      life: 1, 
      color, 
      size: 2+Math.random()*4 
    });
  }
}

function animate() {
  animId = requestAnimationFrame(animate);
  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);
  const W = canvas.width, H = canvas.height;

  const bass = dataArray.slice(0, 15).reduce((a,b)=>a+b,0) / 15;
  const mid = dataArray.slice(15, 80).reduce((a,b)=>a+b,0) / 65;
  const treble = dataArray.slice(80, 250).reduce((a,b)=>a+b,0) / 170;
  const overall = (bass + mid + treble) / 3;

  checkBeatAndBuildUp(bass, mid, treble);

  if (isBeatFrame) {
    beatFlash = 1;
    if (mode === 'stage') spawnParticles(W*0.2 + Math.random()*W*0.6, H*0.5, `hsl(${hue},100%,70%)`, 12);
    if (mode === 'circle') spawnParticles(W/2, H/2, `hsl(${(hue+180)%360},100%,65%)`, 15, 1.2);
  }
  beatFlash *= 0.88;

  levelFill.style.width = (overall / 255 * 100) + '%';
  if (bpm > 0) bpmDisplay.textContent = bpm + ' BPM';

  hue = (hue + 1.2) % 360;
  time += 0.016;

  if (blackoutTimer > 0) {
    blackoutTimer--;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    return;
  }

  if (overall < 3) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    return;
  }

  let tailAlpha = (mode === 'laser' || mode === 'stage' || mode === 'circle') ? 0.05 : 0.15; 
  ctx.fillStyle = `rgba(2, 2, 4, ${tailAlpha})`;
  ctx.fillRect(0, 0, W, H);

  if (beatFlash > 0.05 && mode !== 'bars') {
    ctx.fillStyle = `rgba(${hsl2rgb(hue,100,50)}, ${beatFlash * (mode === 'stage' ? 0.20 : 0.04)})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (mode === 'bars') drawBars(W, H);
  else if (mode === 'circle') drawCircle(W, H, bass, mid, treble);
  else if (mode === 'wave') drawWave(W, H, overall, bass);
  else if (mode === 'laser') drawLaser(W, H, bass, treble);
  else if (mode === 'stage') drawStage(W, H, bass, mid, treble);

  updateParticles();
}

function drawBars(W, H) {
  const bars = 95, barW = W / bars;
  for (let i = 0; i < bars; i++) {
    const barH = (dataArray[i] / 255) * H * 0.88;
    
    const gBottom = ctx.createLinearGradient(i*barW, H, i*barW, H-barH);
    gBottom.addColorStop(0, `hsla(${(hue+i*4)%360},100%,50%,0.9)`);
    gBottom.addColorStop(1, 'transparent');
    ctx.fillStyle = gBottom;
    ctx.fillRect(i*barW, H - barH, barW - 1, barH);

    if (doubleBars) {
      const gTop = ctx.createLinearGradient(i*barW, 0, i*barW, barH);
      gTop.addColorStop(0, `hsla(${(hue+i*4)%360},100%,50%,0.9)`);
      gTop.addColorStop(1, 'transparent');
      ctx.fillStyle = gTop;
      ctx.fillRect(i*barW, 0, barW - 1, barH);
    }
  }
}

function drawCircle(W, H, bass, mid, treble) {
  const cx = W / 2, cy = H / 2;
  const baseR = Math.min(W, H) * 0.14;
  const points = 120;

  const rings = [
    { energy: bass,  amp: 95, hOffset: 0,   rotSpeed: time * 0.4 },   
    { energy: mid,   amp: 75, hOffset: 60,  rotSpeed: -time * 0.6 },  
    { energy: treble, amp: 55, hOffset: 120, rotSpeed: time * 0.9 }    
  ];

  rings.forEach((ring, rIdx) => {
    ctx.beginPath();
    const currentR = baseR * (1 + rIdx * 0.35) + (ring.energy / 255) * 25;
    const rHue = (hue + ring.hOffset) % 360;

    for (let i = 0; i <= points; i++) {
      const sampleIdx = Math.floor((i % (points / 2)) * 1.5) + (rIdx * 30);
      const audioVal = dataArray[sampleIdx % bufferLength] || 0;
      
      const v = (audioVal / 255) * ring.amp;
      const angle = (i / points) * Math.PI * 2 + ring.rotSpeed;
      
      const rx = cx + Math.cos(angle) * (currentR + v);
      const ry = cy + Math.sin(angle) * (currentR + v);

      if (i === 0) ctx.moveTo(rx, ry);
      else ctx.lineTo(rx, ry);
    }

    ctx.closePath();
    ctx.strokeStyle = `hsl(${rHue}, 100%, 60%)`;
    ctx.lineWidth = 2 + (ring.energy / 255) * 5;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = 8 + (ring.energy / 255) * 20;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });
}

function drawWave(W, H, overall, bass) {
  const bNorm = bass / 255;
  const lines = 5; 
  
  for (let w = 0; w < lines; w++) {
    ctx.beginPath();
    const midY = H * 0.2 + (w / lines) * H * 0.65;
    const waveColor = `hsl(${(hue + w * 50) % 360}, 100%, 65%)`;

    const numPoints = 8; 
    const points = [];

    for (let i = 0; i <= numPoints; i++) {
      const x = (i / numPoints) * W;
      const dataIdx = Math.floor((i / numPoints) * 120) + (w * 15);
      const audioVal = ((dataArray[dataIdx] || 0) / 255 - 0.5) * 2;
      
      const localFreq = i * 0.5 + time * (1.5 + w * 0.4);
      const y = midY + (audioVal * (70 + overall * 1.5)) * Math.sin(localFreq);
      points.push({ x, y });
    }

    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 0; i < points.length - 1; i++) {
      const xc = (points[i].x + points[i + 1].x) / 2;
      const yc = (points[i].y + points[i + 1].y) / 2;
      ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
    }
    ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);

    ctx.strokeStyle = waveColor;
    ctx.lineWidth = 2.5 + bNorm * 2.5;
    ctx.globalAlpha = 0.4 + (w * 0.12); 
    ctx.stroke();
    ctx.globalAlpha = 1.0; 
  }
}

function renderAdvancedBeam(cx, cy, tx, ty, finalAngle, lHue, bNorm, laserAlpha) {
  const baseWidth = 1.2 + bNorm * 2.5;
  const endWidth = baseWidth * (3.0 + bNorm * 3.5); 
  const perpAngle = finalAngle + Math.PI / 2;
  
  const x1 = cx - Math.cos(perpAngle) * baseWidth;
  const y1 = cy - Math.sin(perpAngle) * baseWidth;
  const x2 = cx + Math.cos(perpAngle) * baseWidth;
  const y2 = cy + Math.sin(perpAngle) * baseWidth;
  
  const x3 = tx + Math.cos(perpAngle) * endWidth;
  const y3 = ty + Math.sin(perpAngle) * endWidth;
  const x4 = tx - Math.cos(perpAngle) * endWidth;
  const y4 = ty - Math.sin(perpAngle) * endWidth;

  const g = ctx.createLinearGradient(cx, cy, tx, ty);
  g.addColorStop(0, `rgba(255,255,255,${laserAlpha})`);
  g.addColorStop(0.08, `hsla(${lHue},100%,65%,${laserAlpha * 0.95})`);
  g.addColorStop(0.45, `hsla(${lHue},100%,50%,${laserAlpha * 0.6})`);
  g.addColorStop(1.0, 'transparent');

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.lineTo(x4, y4);
  ctx.closePath();
  
  ctx.shadowColor = `hsl(${lHue},100%,50%)`; 
  ctx.shadowBlur = 10 + bNorm * 30;
  ctx.fill(); 
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function drawLaser(W, H, bass, treble) {
  const bNorm = bass/255;
  const tNorm = treble/255;
  const dynamicChromaHue = (hue * 5) % 360;

  for (let i = 0; i < laserCount; i++) {
    const lHue = (laserColorMode === 'chroma') ? dynamicChromaHue : (hue * 5 + i * (360 / laserCount)) % 360;
    let cx, cy, baseAngle;

    if (laserCount === 2) {
      cx = (i === 0) ? 15 : W - 15; cy = H / 2;
      baseAngle = (i === 0) ? 0 : Math.PI; 
    } else {
      cx = W * 0.05 + (i / (laserCount - 1 || 1)) * W * 0.9;
      cy = (laserPlacement === 'top') ? 10 : H * 0.86; 
      baseAngle = (laserPlacement === 'top') ? Math.PI / 2 : -Math.PI / 2;
    }

    if (isBeatFrame) {
      laserTargets[i] = (Math.random() - 0.5) * Math.PI * (laserCount === 2 ? 0.6 : 0.7);
    }
    
    laserAngles[i] += (laserTargets[i] - laserAngles[i]) * 0.28;
    const finalAngle = baseAngle + laserAngles[i];
    const beamLength = Math.max(W, H) * 1.4;

    let laserAlpha = 1;
    if (tNorm > 0.4 && Math.random() > 0.5) laserAlpha = Math.random() > 0.3 ? 1.0 : 0.08;

    renderAdvancedBeam(cx, cy, cx + Math.cos(finalAngle)*beamLength, cy + Math.sin(finalAngle)*beamLength, finalAngle, lHue, bNorm, laserAlpha);
  }

  if (laserPlacement === 'bottom' && laserCount > 2) drawSimpleCrowd(W, H, bass);
}

function drawSimpleCrowd(W, H, bass) {
  const bNorm = bass/255;
  const step = W / crowdSize;
  ctx.fillStyle = 'rgba(1, 1, 2, 0.85)'; 
  for (let i = 0; i <= crowdSize; i++) {
    const p = crowdOffsets[i]; const x = i * step;
    const jump = Math.sin(time * 12 + p.speedPhase) * (1.5 + bNorm * 18) * p.heightFactor;
    const headY = H * 0.89 + jump;
    ctx.beginPath();
    ctx.moveTo(x - step * 0.6, H); ctx.lineTo(x - step * 0.3, headY + p.headRadius * 0.8);
    ctx.arc(x, headY, p.headRadius, 0, Math.PI, true);
    ctx.lineTo(x + step * 0.3, headY + p.headRadius * 0.8); ctx.lineTo(x + step * 0.6, H);
    ctx.closePath(); ctx.fill();
  }
}

/* =========================================================================
   MODE SCÈNE — REFONTE COMPLÈTE
   Objectif : une vraie impression de structure de festival (truss en treillis,
   lyres motorisées identifiables, mur LED pixelisé qui réagit par zone,
   perspective de sol, fumée basse, foule en silhouette au premier plan).
   ========================================================================= */

// --- petits utilitaires de dessin réutilisés dans le rig ---

function drawTrussSegment(x1, y1, x2, y2, thickness, alpha) {
  // Un segment de "truss" alu : deux rails parallèles + croisillons, comme une vraie poutre de scène
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  const nx = -dy / len, ny = dx / len; // normale unitaire
  const hw = thickness / 2;

  ctx.strokeStyle = `rgba(180,190,200,${alpha})`;
  ctx.lineWidth = 1.4;

  // rails
  ctx.beginPath();
  ctx.moveTo(x1 + nx*hw, y1 + ny*hw); ctx.lineTo(x2 + nx*hw, y2 + ny*hw);
  ctx.moveTo(x1 - nx*hw, y1 - ny*hw); ctx.lineTo(x2 - nx*hw, y2 - ny*hw);
  ctx.stroke();

  // croisillons façon zigzag
  const segments = Math.max(2, Math.round(len / (thickness * 1.1)));
  ctx.beginPath();
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const px = x1 + dx * t, py = y1 + dy * t;
    const side = (i % 2 === 0) ? 1 : -1;
    const ex = px + nx * hw * side, ey = py + ny * hw * side;
    if (i === 0) ctx.moveTo(ex, ey); else ctx.lineTo(ex, ey);
  }
  ctx.stroke();
}

function drawMoverHead(x, y, angle, lHue, bNorm, scale, alphaBoost) {
  // Corps de la lyre : base ronde fixe + tête mobile orientable + faisceau volumétrique
  const baseR = 8 * scale;

  // halo ambiant chaud autour de la source (donne l'impression de vraie source lumineuse)
  const haloR = 26 * scale * (0.7 + bNorm * 0.8);
  const halo = ctx.createRadialGradient(x, y, 0, x, y, haloR);
  halo.addColorStop(0, `hsla(${lHue},100%,75%,${0.5 * alphaBoost})`);
  halo.addColorStop(1, 'transparent');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(x, y, haloR, 0, Math.PI*2); ctx.fill();

  // base fixe (yoke) — petit boîtier métallique
  ctx.fillStyle = 'rgba(28,30,36,0.95)';
  ctx.beginPath(); ctx.arc(x, y, baseR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(90,95,105,0.8)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // tête orientable (petit rectangle qui pivote réellement vers `angle`)
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = 'rgba(15,16,20,0.95)';
  ctx.fillRect(-baseR*0.55, -baseR*0.95, baseR*1.1, baseR*1.9);
  // lentille lumineuse au bout de la tête
  ctx.fillStyle = `hsla(${lHue},100%,80%,${0.95 * alphaBoost})`;
  ctx.shadowColor = `hsl(${lHue},100%,60%)`;
  ctx.shadowBlur = 12 * scale;
  ctx.beginPath(); ctx.arc(0, baseR*0.95, baseR*0.42, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function renderVolumetricBeam(cx, cy, angle, length, lHue, bNorm, alpha) {
  // Faisceau large et doux (façon vraie diffusion dans le brouillard de scène),
  // distinct des lasers fins de renderAdvancedBeam — ici on veut un cône large.
  const spread = 0.085 + bNorm * 0.05;
  const tx = cx + Math.cos(angle) * length;
  const ty = cy + Math.sin(angle) * length;
  const a1 = angle - spread, a2 = angle + spread;
  const x1 = cx + Math.cos(a1) * length, y1 = cy + Math.sin(a1) * length;
  const x2 = cx + Math.cos(a2) * length, y2 = cy + Math.sin(a2) * length;

  const g = ctx.createLinearGradient(cx, cy, tx, ty);
  g.addColorStop(0, `hsla(${lHue},100%,85%,${alpha * 0.55})`);
  g.addColorStop(0.5, `hsla(${lHue},100%,60%,${alpha * 0.22})`);
  g.addColorStop(1, 'transparent');

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.closePath();
  ctx.fill();
}

function drawLEDWall(x, y, w, h, dataArray, bufferLength, hue, bNorm) {
  // Vrai mur LED pixelisé : grille de cellules, chacune lit une bande de fréquence
  // et possède sa propre inertie lumineuse (ledCells), pour un rendu moins "plat" qu'un dégradé.
  const cw = w / LED_COLS, ch = h / LED_ROWS;

  // cadre du mur (structure noire autour des pixels, comme un vrai panneau LED)
  ctx.fillStyle = 'rgba(4,4,6,0.9)';
  ctx.fillRect(x - 6, y - 6, w + 12, h + 12);

  for (let row = 0; row < LED_ROWS; row++) {
    for (let col = 0; col < LED_COLS; col++) {
      const idx = row * LED_COLS + col;
      // bande de fréquence associée à la colonne, intensité modulée par la ligne (plus réactif au centre)
      const freqIdx = Math.min(bufferLength - 1, 6 + col * 9 + row * 2);
      const raw = (dataArray[freqIdx] || 0) / 255;
      const rowFalloff = 1 - Math.abs(row - LED_ROWS/2) / (LED_ROWS/2) * 0.4;
      const target = raw * rowFalloff;

      // inertie : la cellule monte vite, descend lentement (comportement réaliste de LED pilotée)
      ledCells[idx] = ledCells[idx] + (target - ledCells[idx]) * (target > ledCells[idx] ? 0.55 : 0.08);

      const energy = ledCells[idx];
      const px = x + col * cw, py = y + row * ch;
      const cellHue = (hue + col * 8 + row * 4) % 360;

      // pixel "allumé" avec léger espace inter-pixel pour l'effet grille
      ctx.fillStyle = `hsla(${cellHue}, 95%, ${28 + energy*45}%, ${0.25 + energy*0.75})`;
      ctx.fillRect(px + 1, py + 1, cw - 2, ch - 2);

      if (energy > 0.55) {
        ctx.shadowColor = `hsl(${cellHue},100%,60%)`;
        ctx.shadowBlur = 6 * energy;
        ctx.fillRect(px + 1, py + 1, cw - 2, ch - 2);
        ctx.shadowBlur = 0;
      }
    }
  }
}

function drawStageRigStructure(W, H, topY, bottomY, leftX, rightX) {
  // Portique principal en treillis : deux montants verticaux + traverse horizontale haute,
  // avec une légère perspective (le bas est plus large que le haut) pour donner du volume.
  const topLeftX = leftX + (rightX - leftX) * 0.06;
  const topRightX = rightX - (rightX - leftX) * 0.06;

  drawTrussSegment(topLeftX, topY, topRightX, topY, 14, 0.55);      // traverse haute
  drawTrussSegment(leftX, bottomY, topLeftX, topY, 12, 0.5);         // montant gauche (incliné)
  drawTrussSegment(rightX, bottomY, topRightX, topY, 12, 0.5);       // montant droit (incliné)

  // petites traverses diagonales de contreventement, pur détail réaliste
  drawTrussSegment(leftX, bottomY, topLeftX + (topRightX-topLeftX)*0.18, topY, 8, 0.28);
  drawTrussSegment(rightX, bottomY, topRightX - (topRightX-topLeftX)*0.18, topY, 8, 0.28);
}

function drawStageFloorAndCrowd(W, H, bass, frontY) {
  const bNorm = bass / 255;

  // sol de scène en légère perspective (trapèze sombre réfléchissant)
  const floorTopW = W * 0.62, floorBottomW = W * 0.94;
  const floorTopY = frontY, floorBottomY = H;
  const g = ctx.createLinearGradient(0, floorTopY, 0, floorBottomY);
  g.addColorStop(0, 'rgba(20,20,28,0.9)');
  g.addColorStop(1, 'rgba(4,4,7,0.98)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(W/2 - floorTopW/2, floorTopY);
  ctx.lineTo(W/2 + floorTopW/2, floorTopY);
  ctx.lineTo(W/2 + floorBottomW/2, floorBottomY);
  ctx.lineTo(W/2 - floorBottomW/2, floorBottomY);
  ctx.closePath();
  ctx.fill();

  // lignes de perspective subtiles sur le sol (façon dalles de scène)
  ctx.strokeStyle = 'rgba(255,255,255,0.045)';
  ctx.lineWidth = 1;
  for (let i = -4; i <= 4; i++) {
    const topX = W/2 + (i/4) * (floorTopW/2);
    const bottomX = W/2 + (i/4) * (floorBottomW/2);
    ctx.beginPath();
    ctx.moveTo(topX, floorTopY);
    ctx.lineTo(bottomX, floorBottomY);
    ctx.stroke();
  }

  // foule au premier plan, plus grande/proche que dans les autres modes (sensation de profondeur)
  const step = W / crowdSize;
  for (let i = 0; i <= crowdSize; i++) {
    const p = crowdOffsets[i];
    const x = i * step;
    const jump = Math.sin(time * 12 + p.speedPhase) * (1.5 + bNorm * 20) * p.heightFactor;
    const headY = H * 0.86 + jump;

    ctx.fillStyle = 'rgba(2,2,4,0.92)';
    ctx.beginPath();
    ctx.moveTo(x - step * 0.62, H);
    ctx.lineTo(x - step * 0.32, headY + p.headRadius * 0.85);
    ctx.arc(x, headY, p.headRadius * 1.15, 0, Math.PI, true);
    ctx.lineTo(x + step * 0.32, headY + p.headRadius * 0.85);
    ctx.lineTo(x + step * 0.62, H);
    ctx.closePath();
    ctx.fill();

    // bras levés occasionnels, cohérents avec le beat
    if (p.armStyle === 2) {
      const armWave = Math.sin(time * 8 + p.armPhase) * 14;
      ctx.strokeStyle = 'rgba(2,2,4,0.92)';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x - 4, headY + 8); ctx.lineTo(x - 16 + armWave, headY - 16 + (bNorm * -9));
      ctx.moveTo(x + 4, headY + 8); ctx.lineTo(x + 16 - armWave, headY - 16 + (bNorm * -9));
      ctx.stroke();
    }
  }
}

function drawStage(W, H, bass, mid, treble) {
  const bNorm = bass/255, mNorm = mid/255, tNorm = treble/255;
  const dynamicChromaHue = (hue * 5) % 360;
  if (!stageRigReady) setupStageRig(W, H);

  // --- Géométrie générale de la scène (perspective simple) ---
  const leftX = W * 0.08, rightX = W * 0.92;
  const topY = H * 0.08, frontY = H * 0.56; // frontY = ligne où la scène rencontre le sol/public

  // brume de fond très légère pour donner de la profondeur atmosphérique derrière le truss
  const fog = ctx.createLinearGradient(0, topY, 0, frontY);
  fog.addColorStop(0, `hsla(${hue},60%,10%,0.35)`);
  fog.addColorStop(1, 'rgba(2,2,4,0)');
  ctx.fillStyle = fog;
  ctx.fillRect(leftX, topY, rightX - leftX, frontY - topY);

  // --- Mur LED en fond de scène, encadré par la structure ---
  const ledW = (rightX - leftX) * 0.74, ledH = (frontY - topY) * 0.6;
  const ledX = leftX + (rightX - leftX - ledW) / 2;
  const ledY = topY + (frontY - topY) * 0.18;
  drawLEDWall(ledX, ledY, ledW, ledH, dataArray, bufferLength, hue, bNorm);

  // --- Structure en treillis autour ---
  drawStageRigStructure(W, H, topY, frontY, leftX, rightX);

  // --- Faisceaux volumétriques larges depuis la traverse haute (ambiance) ---
  const topLeftX = leftX + (rightX - leftX) * 0.06;
  const topRightX = rightX - (rightX - leftX) * 0.06;
  for (let i = 0; i < 4; i++) {
    const bx = topLeftX + (i/3) * (topRightX - topLeftX);
    const sway = Math.sin(time * 0.6 + i * 1.7) * 0.3;
    const lHue = (laserColorMode === 'chroma') ? dynamicChromaHue : (hue + i * 60) % 360;
    renderVolumetricBeam(bx, topY, Math.PI/2 + sway, H * 0.55, lHue, bNorm, 0.5 + bNorm * 0.4);
  }

  // --- Lyres motorisées (têtes mobiles identifiables) sur la rampe avant et les côtés ---
  moverHeads.forEach((mv, i) => {
    if (isBeatFrame && Math.random() > 0.6) {
      mv.targetSwing = (Math.random() - 0.5) * mv.swing;
    }
    mv.currentSwing = (mv.currentSwing || 0) + ((mv.targetSwing || 0) - (mv.currentSwing || 0)) * DEV_CONFIG.interpolationSpeed;
    const liveAngle = mv.baseAngle + mv.currentSwing + Math.sin(time * mv.speed + mv.phase) * 0.12;

    let hx, hy, scale;
    if (mv.group === 'front') {
      const idx = i; // 0..5
      hx = topLeftX + ((idx) / 5) * (topRightX - topLeftX);
      hy = topY + 6;
      scale = 1.1;
    } else if (mv.group === 'left') {
      const idx = i - 6;
      hx = leftX + 4;
      hy = topY + (frontY - topY) * (0.25 + idx * 0.18);
      scale = 0.95;
    } else {
      const idx = i - 9;
      hx = rightX - 4;
      hy = topY + (frontY - topY) * (0.25 + idx * 0.18);
      scale = 0.95;
    }

    const lHue = (laserColorMode === 'chroma') ? dynamicChromaHue : (hue + i * (360/12)) % 360;

    // faisceau fin et net (vrai rayon de lyre), distinct de la nappe volumétrique d'ambiance
    const beamLen = Math.max(W, H) * 0.9;
    let beamAlpha = 0.85;
    if (tNorm > 0.7 && Math.random() > 0.6) beamAlpha = 0.15; // scintillement sur les aigus
    renderAdvancedBeam(hx, hy, hx + Math.cos(liveAngle)*beamLen, hy + Math.sin(liveAngle)*beamLen, liveAngle, lHue, bNorm, beamAlpha);

    drawMoverHead(hx, hy, liveAngle, lHue, bNorm, scale, 0.8 + bNorm * 0.5);
  });

  // --- Flash blanc de stroboscope au sol de scène sur les gros beats (cohérence avec le reste) ---
  if (bNorm > 0.85 && isBeatFrame) {
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(leftX, topY, rightX - leftX, frontY - topY);
  }

  // --- Bord avant de scène (lèvre du praticable, ligne nette qui sépare scène et fosse) ---
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(leftX - 4, frontY);
  ctx.lineTo(rightX + 4, frontY);
  ctx.stroke();

  // --- Fumée basse animée (ambiance club/festival) ---
  if (Math.random() > 0.55) spawnSmoke(W, frontY);
  smokeParticles = smokeParticles.filter(s => s.life > 0.02);
  smokeParticles.forEach(s => {
    s.x += s.vx; s.y += s.vy; s.life *= 0.985;
    const sg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * (1.4 - s.life*0.4));
    sg.addColorStop(0, `hsla(${hue},30%,70%,${0.06 * s.life})`);
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  // --- Sol en perspective + foule au premier plan ---
  drawStageFloorAndCrowd(W, H, bass, frontY);
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0.01);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life *= 0.94;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('hsl(', 'hsla(');
    ctx.fill();
  });
}

function hsl2rgb(h, s, l) {
  h /= 100; l /= 100;
  const a = (s / 100) * Math.min(l, 1-l);
  const f = n => { const k = (n + h*1.2) % 12; return l - a * Math.max(-1, Math.min(k-3, 9-k, 1)); };
  return `${Math.round(f(0)*255)},${Math.round(f(8)*255)},${Math.round(f(4)*255)}`;
}
</script>
